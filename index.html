<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact | Saaf</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

<style>
:root{
  --olive:#2f5f3a;
  --leaf:#3f7a47;
  --sand:#d8caa0;
  --ink:#0f1b12;
  --glass: rgba(255,255,255,.72);
  --glass2: rgba(255,255,255,.52);
  --stroke: rgba(47,95,58,.14);
  --shadow: 0 30px 80px rgba(47,95,58,.14);
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color: var(--ink);
  background:
    radial-gradient(1100px 700px at 18% 20%, rgba(216,202,160,.35), transparent 60%),
    radial-gradient(900px 600px at 85% 75%, rgba(63,122,71,.20), transparent 55%),
    linear-gradient(135deg, #f4f7f2 0%, #ffffff 45%, #eef4ee 100%);
  position: relative;
  overflow:hidden;
  padding: 28px 16px;
}

.container{
  width:min(560px, 92vw);
  text-align:center;
  padding: 42px 40px 44px;
  border-radius: 26px;
  background: linear-gradient(180deg, var(--glass), var(--glass2));
  border: 1px solid var(--stroke);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}

.logo-wrap{
  margin: -6px auto 10px;
}

.logo{
  width: 220px;
  height: auto;
  display:block;
  margin:auto;
  animation: logoReveal 1.8s cubic-bezier(.16, 1, .3, 1) both;
}

@keyframes logoReveal{
  0%{
    opacity: 0;
    transform: scale(0.65);
    filter: blur(10px);
  }
  60%{
    opacity: 1;
    transform: scale(1.07);
    filter: blur(2px);
  }
  100%{
    transform: scale(1);
    filter: blur(0);
  }
}

h1{
  font-size: 2.4rem;
  margin-bottom: 12px;
  font-weight: 800;
}

.title-green{ color: var(--leaf); }
.title-alt{ color: var(--sand); }

p{
  color: rgba(47,95,58,.85);
  font-size: 1.05rem;
  margin-bottom: 30px;
  font-weight: 600;
}

.social-links{
  display:flex;
  justify-content:center;
  gap: 20px;
  flex-wrap: wrap;
}

.social-icon{
  width: 210px;
  text-decoration:none;
  border-radius: 18px;
  padding: 18px 16px;
  background: rgba(255,255,255,.6);
  border: 1px solid rgba(47,95,58,.12);
  box-shadow: 0 14px 40px rgba(47,95,58,.10);
  transition: .3s;
  display:flex;
  align-items:center;
  gap: 14px;
}

.social-icon:hover{
  transform: translateY(-6px);
  box-shadow: 0 22px 60px rgba(47,95,58,.16);
}

.icon-wrapper{
  width: 54px;
  height: 54px;
  border-radius: 16px;
  display:grid;
  place-items:center;
  font-size: 26px;
  color: white;
}

.instagram .icon-wrapper{
  background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
}

.whatsapp .icon-wrapper{
  background: linear-gradient(45deg, #25d366, #128c7e);
}

.meta{
  text-align:left;
}

.label{
  font-weight:800;
  color: var(--olive);
  font-size:.92rem;
}

.hint{
  font-size:.9rem;
  color: rgba(15,27,18,.6);
}

.footer-note{
  margin-top:18px;
  font-size:.9rem;
  color: rgba(15,27,18,.55);
}

@media (max-width:520px){
  .logo{width:180px;}
  .social-icon{width:100%;}
}
</style>
</head>

<body>

<div class="container">

  <div class="logo-wrap">
    <img class="logo" src="logo2.png" alt="Saaf Logo">
  </div>

  <h1>
    <span class="title-green">Contact</span>
    <span class="title-alt">Saaf</span>
  </h1>

  <p>
    Reach the Saaf team instantly — follow our updates and message us anytime.
  </p>

  <div class="social-links">

    <!-- Instagram -->
    <a href="https://www.instagram.com/saaf.su/"
       target="_blank"
       rel="noopener noreferrer"
       class="social-icon instagram">
      <div class="icon-wrapper">
        <i class="fab fa-instagram"></i>
      </div>
      <div class="meta">
        <div class="label">Instagram</div>
        <div class="hint">@saaf.su</div>
      </div>
    </a>

    <!-- WhatsApp (غيري الرقم هنا) -->
    <a href="https://wa.me/96890000000"
       target="_blank"
       rel="noopener noreferrer"
       class="social-icon whatsapp">
      <div class="icon-wrapper">
        <i class="fab fa-whatsapp"></i>
      </div>
      <div class="meta">
        <div class="label">WhatsApp</div>
        <div class="hint">Chat with Saaf</div>
      </div>
    </a>

  </div>

  <div class="footer-note">
    We reply as soon as possible during working hours.
  </div>

</div>

</body>
</html>
